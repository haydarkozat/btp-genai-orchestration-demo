name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: lint · typecheck · test (MOCK mode)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dev environment from lockfile (no live SDK)
        run: uv sync --extra dev --frozen --python ${{ matrix.python-version }}

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy (strict typecheck)
        run: uv run mypy

      - name: Pytest (MOCK mode, with coverage gate)
        env:
          BACKEND_MODE: mock
        run: uv run pytest --cov --cov-report=term-missing

  sdk-contract:
    name: SDK contract (live extra installed, no credentials)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync with the live extra (installs sap-ai-sdk-gen from the lockfile)
        run: uv sync --extra dev --extra live --frozen --python 3.12

      - name: Verify our orchestration request still matches the installed SDK
        run: uv run pytest tests/test_live_contract.py -v
