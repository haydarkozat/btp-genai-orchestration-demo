name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: lint · typecheck · test (MOCK mode)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project (dev extras, no live SDK)
        run: uv pip install --system -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy (strict typecheck)
        run: mypy

      - name: Pytest (MOCK mode, with coverage gate)
        env:
          BACKEND_MODE: mock
        run: pytest --cov --cov-report=term-missing
